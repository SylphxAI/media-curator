name: Release

# Release is not tip product CI. Keep it tag-driven so main push cannot be
# marked red by reusable-workflow startup failures or publish side effects.
on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

jobs:
  release:
    permissions:
      actions: write
      contents: write
      pull-requests: write
      id-token: write
    uses: SylphxAI/.github/.github/workflows/release.yml@main
    secrets: inherit
