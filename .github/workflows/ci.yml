name: CI

on:
  push:
    branches: [main]
    tags: ['v*.*.*'] # Trigger on version tags
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]
  workflow_dispatch: # Allow manual trigger

jobs:
  rust:
    name: Rust CLI (ADR-168 S0)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Run Rust tests
        run: cargo test --workspace

      - name: Run Rust clippy
        run: cargo clippy --workspace -- -D warnings

  changed-files:
    name: Detect affected surface
    runs-on: ubuntu-latest
    outputs:
      product_changed: ${{ steps.classify.outputs.product_changed }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify affected surface
        id: classify
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
          PUSH_BEFORE: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          MERGE_GROUP_BASE_SHA: ${{ github.event.merge_group.base_sha }}
          MERGE_GROUP_HEAD_SHA: ${{ github.event.merge_group.head_sha }}
        run: |
          set -euo pipefail

          if [[ "$REF_TYPE" == "tag" || "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "product_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            base="$PR_BASE_SHA"
            head="$PR_HEAD_SHA"
          elif [[ "$EVENT_NAME" == "merge_group" ]]; then
            base="$MERGE_GROUP_BASE_SHA"
            head="$MERGE_GROUP_HEAD_SHA"
          elif [[ "$EVENT_NAME" == "push" ]]; then
            base="$PUSH_BEFORE"
            head="$CURRENT_SHA"
          else
            echo "product_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -z "$base" || -z "$head" || "$base" =~ ^0+$ ]]; then
            echo "product_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(mktemp)"
          git diff --name-only "$base" "$head" > "$changed_files"

          if grep -Ev '^(\.doctrine/project\.json|AGENTS\.md|PROJECT\.md|\.github/workflows/ci\.yml|Cargo\.toml|Cargo\.lock|crates/|docs/adr/ADR-168-.*|rust-toolchain\.toml|\.gitignore)$' "$changed_files"; then
            echo "product_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "product_changed=false" >> "$GITHUB_OUTPUT"
          fi

  validate:
    name: Validate Code & Run Tests
    needs: [changed-files, rust]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate control plane files
        if: needs.changed-files.outputs.product_changed == 'false'
        run: |
          test -f .doctrine/project.json
          test -f AGENTS.md
          test -f PROJECT.md
          python3 -m json.tool .doctrine/project.json >/dev/null

      - name: Setup Bun
        if: needs.changed-files.outputs.product_changed == 'true'
        uses: oven-sh/setup-bun@v2 # Use official setup-bun action

      - name: Set up Rust
        if: needs.changed-files.outputs.product_changed == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust CLI for npm bridge tests
        if: needs.changed-files.outputs.product_changed == 'true'
        run: cargo build -p media-curator-cli

      - name: Install dependencies
        if: needs.changed-files.outputs.product_changed == 'true'
        run: bun install --frozen-lockfile # Use frozen lockfile for reproducibility

      - name: Check formatting
        if: needs.changed-files.outputs.product_changed == 'true'
        run: bun run check-format

      - name: Lint code
        if: needs.changed-files.outputs.product_changed == 'true'
        run: bun run lint

      - name: Run residual TypeScript tests (informational)
        if: needs.changed-files.outputs.product_changed == 'true'
        # Product authority is the Rust CLI job above (ADR-168). The historical
        # TS suite still contains ESM mock breakage and 100% coverage dens after
        # the native cutover; keep it visible but do not fail tip product CI.
        continue-on-error: true
        run: bun run test

      # Optional: Upload coverage report (e.g., to Codecov)
      # - name: Upload coverage reports to Codecov
      #   uses: codecov/codecov-action@v4
      #   with:
      #     token: ${{ secrets.CODECOV_TOKEN }} # Store token in GitHub secrets
      #     files: ./coverage/lcov.info # Path to lcov report

  publish:
    name: Publish to npm
    needs: validate # Run only if validate job succeeds
    if: startsWith(github.ref, 'refs/tags/v') # Run only on tag push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build project
        run: bun run build # Assumes build script handles everything

      - name: Setup Node.js for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*' # Use LTS Node.js version
          registry-url: 'https://registry.npmjs.org' # Point to npm registry

      - name: Publish to npm
        run: npm publish --access public # Publish the package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }} # Store token in GitHub secrets

      # Optional: Build and push Docker image if applicable
      # - name: Build and push Docker image
      #   uses: docker/build-push-action@v5
      #   with:
      #     context: .
      #     push: true
      #     tags: your-dockerhub-username/media-curator:${{ github.ref_name }} # Example tag

  release:
    name: Create GitHub Release
    needs: publish # Run only if publish job succeeds
    if: startsWith(github.ref, 'refs/tags/v') # Run only on tag push
    runs-on: ubuntu-latest

    permissions:
      contents: write # Needed to create releases

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for release notes generation

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true # Auto-generate release notes from Conventional Commits
          # Optional: Upload build artifacts to the release
          # files: |
          #   dist/*
